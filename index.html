</section>

    <div id="careerResults"></div>

    <button onclick="restart()">Retake Quiz</button>

</section>


<section class="about">

<h2>Why CareerPath AI?</h2>

<p>
Choosing a career can feel overwhelming. CareerPath AI helps students
explore possible paths based on their interests, strengths, and goals.
</p>
